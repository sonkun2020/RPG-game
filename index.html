<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>自分は勇者 - STABLE</title>

<style>
body{
margin:0;
background:#050505;
color:#eee;
font-family:sans-serif;
text-align:center;
overflow:hidden;
}

#title{margin-top:120px;}

canvas{
background:#111;
border-radius:10px;
margin-top:10px;
}

.panel{
width:340px;
margin:10px auto;
padding:10px;
background:rgba(255,255,255,0.05);
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
}

#log{
height:150px;
overflow:auto;
text-align:left;
font-size:13px;
line-height:1.4;
white-space:pre-line;
}

button{
margin:3px;
padding:8px 12px;
background:#111;
color:#fff;
border:1px solid #444;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="title">
<h1>自分は勇者</h1>
<button onclick="start()">START</button>
</div>

<div id="game" style="display:none;">

<div class="panel">
<canvas id="map" width="320" height="320"></canvas>
</div>

<div class="panel" id="status"></div>

<div class="panel">
<div id="log"></div>
</div>

<div class="panel">
<button onclick="act('attack')">攻撃</button>
<button onclick="act('defend')">防御</button>
<button onclick="act('talk')">話す</button>
<button onclick="act('item')">アイテム</button>
</div>

</div>

<script>

// ======================
// 状態管理（重要）
// ======================

let gameState = "MAP"; // MAP / BATTLE / CUT / END

let player = {hp:100, atk:10};
let enemy = null;

let talkCount = 0;
let defend = false;

// 魔王専用フラグ
let bossFlag = false;

// ======================
// 開始
// ======================

function start(){
document.getElementById("title").style.display="none";
document.getElementById("game").style.display="block";
log("目が覚めた");
draw();
}

// ======================
// ログ
// ======================

function log(t){
let l=document.getElementById("log");
l.innerText+=t+"\n";
l.scrollTop=l.scrollHeight;
}

// ======================
// マップ
// ======================

document.addEventListener("keydown",(e)=>{
if(gameState!=="MAP") return;

draw();

if(Math.random()<0.04){
spawnEnemy();
}
});

// ======================
// 敵生成（完全分離）
// ======================

function spawnEnemy(){

let r=Math.random();

if(r<0.6){
enemy = createEnemy("mob");
}
else if(r<0.85){
enemy = createEnemy("A");
}
else{
enemy = createEnemy("boss");
bossFlag = true;
}

gameState="BATTLE";

log(enemy.name+"出現");
}

// ======================
// 敵生成関数
// ======================

function createEnemy(type){

if(type==="mob"){
return {type:"mob",name:"魔物",hp:30,atk:6};
}

if(type==="A"){
return {type:"A",name:"フラッシュ・アース",hp:60,atk:8};
}

if(type==="boss"){
return {type:"boss",name:"魔王",hp:150,atk:15};
}

}

// ======================
// 行動
// ======================

function act(type){

if(gameState!=="BATTLE") return;

// 攻撃
if(type==="attack"){
let d=player.atk+rand(-2,2);
enemy.hp-=d;
log("攻撃 "+d);
}

// 防御
if(type==="defend"){
defend=true;
log("防御");
}

// 話す（魔王だけ意味あり）
if(type==="talk"){

if(enemy.type!=="boss") return;

talkCount++;

log("……");

if(talkCount>=4){
ending("true");
return;
}
}

// アイテム
if(type==="item"){
ending("abandon");
return;
}

enemyTurn();

if(enemy.hp<=0){
resolveBattle();
}

}

// ======================
// 敵ターン
// ======================

function enemyTurn(){

let d=enemy.atk;

if(defend) d=Math.floor(d/2);
defend=false;

player.hp-=d;

log(enemy.name+"攻撃 "+d);

if(player.hp<=0){
location.reload();
}
}

// ======================
// 戦闘終了（完全分離）
// ======================

function resolveBattle(){

if(enemy.type==="mob"){
gameState="MAP";
log("撃破");
return;
}

if(enemy.type==="A"){
gameState="MAP";
log("違和感が残る……");
return;
}

if(enemy.type==="boss"){
ending("hero");
}

}

// ======================
// ED管理（安全構造）
// ======================

function ending(type){

gameState="END";

document.body.innerHTML="";

if(type==="hero"){
document.body.innerHTML="<h2>勇者エンド</h2><p>魔王は倒された</p>";
}

if(type==="abandon"){
document.body.innerHTML="<h2>放棄エンド</h2><p>あなたは選ばなかった</p>";
}

if(type==="true"){
document.body.innerHTML=`
<h2>真エンド</h2>
<p>あなたはシンヤ・ラースだった</p>
`;
}

}

// ======================
// util
// ======================

function rand(a,b){
return Math.floor(Math.random()*(b-a+1))+a;
}

function draw(){
document.getElementById("status").innerText=
"HP:"+player.hp;
}

</script>

</body>
</html>
